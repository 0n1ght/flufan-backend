<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flufan- Reset link expired</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .logo {
            color: #6a1b9a;
            font-size: clamp(36px, 8vw, 48px);
            font-weight: bold;
            margin-bottom: 2rem;
        }
        .icon {
            font-size: clamp(60px, 15vw, 80px);
            color: red;
            margin-bottom: 1.5rem;
        }
        .message {
            font-size: clamp(20px, 6vw, 24px);
            color: #333;
            margin-bottom: 1rem;
        }
        .submessage {
            font-size: clamp(14px, 4vw, 16px);
            color: #666;
        }
        .home-btn {
            margin-top: 2rem;
            padding: 12px 24px;
            background: #6a1b9a;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
        }
        .home-btn:hover {
            background: #4a148c;
        }
    </style>
</head>
<body>
<div class="logo">Flufan</div>
<div class="icon">❌</div>
<div class="message">Link Expired</div>
<div class="submessage">Please request a new password reset link.</div>
<a href="/" class="home-btn">Go Home</a>
</body>
</html>
