<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frinkan- Sign Up</title>
    <link rel="stylesheet" href="../static/css/sign_up.css" th:href="@{/css/sign_up.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <script src="../static/js/sign_up.js" th:src="@{/js/sign_up.js}"></script>
</head>

<body>
<h1 id="logo"><a href="/" style="text-decoration: none">Frinkan</a></h1>
<div id="mainFrame">
    <h2>Sign Up</h2>
    <form action="/sign-up" method="post">
        <input type="text" name="username" placeholder="Username" id="username" required>
        <input type="email" name="email" placeholder="Email" id="email" required>
        <input type="password" name="password" placeholder="Password" id="password" required>
        <input type="password" name="confirmPassword" placeholder="Repeat password" id="confirmPassword" required>
        <div id="errors" style="color: red">
            <div th:if="${emailExists}" id="emailInUsePrompt">
                <p>🥶 Email already in use. Try to sign in</p>
            </div>
            <div th:if="${passwordMatch}" id="passwordMatchPrompt">
                <p>🥶 Passwords do not match</p>
            </div>
        </div>
        <div style="height: 10px"></div>
        <br>
        <label>By creating an account, you agree to Frinkan's <br> <a href="/terms/conditions-of-use">Conditions of Use</a> and <a href="/terms/privacy-notice">Privacy Notice</a>.</label>
        <br>
        <br>
        <input type="submit" id="submit" value="Submit">
    </form>
    <p>Already have an account? <a href="/login">Sign in</a></p>
</div>
<div style="height: 40px"></div>
</body>
</html>
<script>
    const submitButton = document.getElementById("submit");
    submitButton.addEventListener('click',()=>{
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const email = document.getElementById('email').value;
      const data ={
        username,
        email,
        password
      }

      if(password == confirmPassword){
        const jsonData = JSON.stringify(data);
        fetch('/req/signup', {
          method: 'POST',
          headers:{
            'Content-Type': 'application/json'
          },
          body: jsonData
        })
        .then(response =>{
          //alert('successful');
          //if(response.status == 200){
            //alert('successful');
          //xs}
        })
      }

    })
</script>
