<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flufan- Sign Up</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gidugu&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Helvetica, Arial, sans-serif;
        }

        h2 {
            color: #333;
            font-size: 35px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: none;
            outline: none;
            border-bottom: 2px solid rgb(150, 150, 150);
            width: 300px;
            height: 40px;
            font-size: 16px;
            color: #1d2129;
            margin-bottom: 20px;
        }

        input::placeholder {
            color: rgb(150, 150, 150);
        }

        .password-field {
            position: relative;
            width: 300px;
        }

        .password-field input {
            width: 100%;
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-120%);
            cursor: pointer;
            color: rgb(150, 150, 150);
        }

        form label {
            font-size: 15px;
            color: #1d2129;
        }

        a {
            text-decoration: none;
            color: #6a1b9a;
        }

        a:hover {
            text-decoration: underline;
        }

        #logo {
            margin-bottom: 5px;
            font-family: "Tilt Warp", sans-serif;
            font-size: 60px;
            font-weight: 400;
            font-style: normal;
            color: #6a1b9a;
            user-select: none;
        }

        #mainFrame {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: WHITE;
            width: 400px;
            height: 540px;
            border-radius: 10px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
        }

        #username:focus, #email:focus, #password:focus, #confirmPassword:focus {
            border-bottom-color: #6a1b9a;
        }

        #submit {
            margin-top: 10px;
            background-color: #6a1b9a;
            color: WHITE;
            font-weight: bold;
            border-style: none;
            border-radius: 10px;
            height: 40px;
        }

        #submit:hover {
            transition: 0.2s;
            background-color: #7b32a8;
            cursor: pointer;
        }

        #termsAccept {
            width: 20px;
        }

        #errors {
            display: none;
            color: rgb(255, 80, 80);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        @media screen and (max-width: 767px) {

            body {
                background-color: WHITE;
            }

            input {
                border-style: solid;
                border-width: 1px;
                border-radius: 5px;
            }

            #mainFrame {
                box-shadow: none;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <script src="../static/js/sign_up.js" th:src="@{/js/sign_up.js}"></script>
</head>

<body>
    <h1 id="logo"><a href="/" style="text-decoration: none">Flufan</a></h1>
    <div id="mainFrame">
        <h2>Sign Up</h2>
        <form method="post" action="/api/account/signup">
            <input type="text" name="username" placeholder="Username" id="username" required>
            <input type="email" name="email" placeholder="Email" id="email" required>
            <div class="password-field">
                <input type="password" name="password" placeholder="Password" id="password" required>
                <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
            </div>
            <div class="password-field">
                <input type="password" name="confirmPassword" placeholder="Repeat password" id="confirmPassword" required>
                <i class="fas fa-eye-slash toggle-password" data-target="confirmPassword"></i>
            </div>
            <div id="errors"></div>
            <div style="height: 10px"></div>
            <label>By creating an account, you agree to Flufan's <br> <a href="/terms/conditions-of-use">Conditions of Use</a> and <a href="/terms/privacy-notice">Privacy Notice</a>.</label>
            <input type="submit" id="submit" value="Submit">
        </form>
        <label>Already have an account? <a href="/login">Sign in</a></label>
    </div>
    <div style="height: 40px"></div>

    <script>
        const togglePasswords = document.querySelectorAll(".toggle-password");
        togglePasswords.forEach(toggle => {
            const targetInput = document.getElementById(toggle.dataset.target);
            toggle.addEventListener("click", () => {
                const type = targetInput.type === "password" ? "text" : "password";
                targetInput.type = type;
                toggle.classList.toggle("fa-eye");
                toggle.classList.toggle("fa-eye-slash");
            });
        });

        const form = document.querySelector("form");
        const errorsDiv = document.getElementById("errors");
        const mainFrame = document.getElementById("mainFrame");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (username.length < 4) {
                errorsDiv.textContent = "🥶 Username must be at least 4 characters long.";
                errorsDiv.style.display = "block";
                mainFrame.style.height = (540 + errorsDiv.offsetHeight + 10) + "px";
                return;
            }

            if (password.length < 8) {
                errorsDiv.textContent = "🥶 Password must be at least 8 characters long.";
                errorsDiv.style.display = "block";
                mainFrame.style.height = (540 + errorsDiv.offsetHeight + 10) + "px";
                return;
            }

            if (password !== confirmPassword) {
                errorsDiv.textContent = "🥶 Passwords do not match";
                errorsDiv.style.display = "block";
                mainFrame.style.height = (540 + errorsDiv.offsetHeight + 10) + "px";
                return;
            }

            try {
                const regResponse = await fetch("/api/account/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });
                const regData = await regResponse.json();

                if (!regResponse.ok) {
                    errorsDiv.textContent = "🥶 " + (regData.message || "Registration failed");
                    errorsDiv.style.display = "block";
                    mainFrame.style.height = (540 + errorsDiv.offsetHeight + 10) + "px";
                    return;
                }

                const loginResponse = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginResponse.json();

                if (loginResponse.ok && loginData.token) {
                    localStorage.setItem("token", loginData.token);
                    window.location.href = "/";
                } else {
                    errorsDiv.textContent = "🥶 Login failed after registration";
                    errorsDiv.style.display = "block";
                    mainFrame.style.height = (540 + errorsDiv.offsetHeight + 10) + "px";
                }

            } catch (error) {
                errorsDiv.textContent = "🥶 An error occurred. Please try again later.";
                errorsDiv.style.display = "block";
                mainFrame.style.height = (540 + errorsDiv.offsetHeight + 10) + "px";
            }
        });
    </script>
</body>
</html>
