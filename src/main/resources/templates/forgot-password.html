<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flufan- Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gidugu&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Helvetica, Arial, sans-serif;
        }

        h2 {
            color: #333;
            font-size: 35px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input {
            padding: 10px;
            border-style: none;
            outline: none;
            border-bottom: 2px solid rgb(150, 150, 150);
            width: 300px;
            height: 40px;
            font-size: 16px;
            color: #1d2129;
            margin-bottom: 20px;
        }

        input::placeholder {
            color: rgb(150, 150, 150);
        }

        a {
            text-decoration: none;
            color: #6a1b9a;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #42b72a;
            color: WHITE;
            font-weight: bold;
            border-style: none;
            border-radius: 10px;
            height: 40px;
            width: 350px;
            transform: translateY(35px);
        }

        button:hover {
            transition: 0.2s;
            background-color: #3ca328;
            cursor: pointer;
        }

        #logo {
            margin-top: 5vh;
            margin-bottom: 5px;
            font-family: "Tilt Warp", sans-serif;
            font-size: 60px;
            font-weight: 400;
            font-style: normal;
            color: #6a1b9a;
            user-select: none;
        }

        #mainFrame {
            height: 260px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: WHITE;
            border-radius: 10px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
        }


        #email:focus {
            border-bottom-color: #6a1b9a;
        }

        #submit {
            margin-top: 10px;
            background-color: #6a1b9a;
            color: WHITE;
            border-style: none;
            border-radius: 10px;
            height: 40px;
            width: 300px;
        }

        #submit:hover {
            transition: 0.2s;
            background-color: #7b32a8;
            cursor: pointer;
        }

        #submit {
            font-family: Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
        }

        #errors {
            display: none;
            color: rgb(255, 80, 80);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 430px) {
            body {
                background-color: white;
            }
            #mainFrame {
                box-shadow: none;
            }
        }

        @media (max-width: 342px) {
            h2 {
                font-size: 28px;
            }
            input, #submit, button {
                width: 90%;
                font-size: 16px;
                height: 35px;
                margin-left: 10px;
            }
            #loginForm {
                width: 90%;
            }
            #logo {
                font-size: 50px;
            }
            #mainFrame {
                height: auto;
                padding: 10px;
            }
            #submit {
                width: 80%;
            }
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px white inset;
            box-shadow: 0 0 0 1000px white inset;
            -webkit-text-fill-color: #1d2129;
            transition: background-color 9999s ease-in-out 0s;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
</head>

<body>
    <h1 id="logo"><a href="/" style="text-decoration: none">Flufan</a></h1>
    <div id="mainFrame">
        <h2>Forgot password</h2>
        <form id="loginForm" method="post" action="/api/auth/forgot-password">
            <input
                    type="text"
                    name="username"
                    id="email"
                    placeholder="Email or Username"
                    autocomplete="username"
                    required
            >
            <div id="errors"><p>hello</p></div>
            <input type="submit" id="submit" value="Submit">
        </form>
        <p><a href="/login">Sign in</a> / <a href="/signup">Sign up</a></p>
    </div>
    <div style="height: 80px"></div>

    <script>
        const form = document.getElementById("loginForm");
        const errorsDiv = document.getElementById("errors");
        const mainFrame = document.getElementById("mainFrame");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            try {
                const response = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const text = await response.text();

                if (response.ok) {
                    errorsDiv.style.color = "green";
                    errorsDiv.textContent = text || "Request successful";
                } else {
                    errorsDiv.style.color = "red";
                    errorsDiv.textContent = "🥶 " + (text || "Request failed");
                }

                errorsDiv.style.display = "block";
                mainFrame.style.height = (260 + errorsDiv.offsetHeight + 16) + "px";
            } catch {
                errorsDiv.style.color = "red";
                errorsDiv.textContent = "🥶 An error occurred. Please try again later.";
                errorsDiv.style.display = "block";
                mainFrame.style.height = (260 + errorsDiv.offsetHeight + 30) + "px";
            }
            document.getElementById("email").value = "";
        });
    </script>
</body>
</html>
