<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flufan- Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gidugu&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Helvetica, Arial, sans-serif;
        }

        h2 {
            color: #333;
            font-size: 35px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input {
            padding: 10px;
            border-style: none;
            outline: none;
            border-bottom: 2px solid rgb(150, 150, 150);
            width: 300px;
            height: 40px;
            font-size: 16px;
            color: #1d2129;
            margin-bottom: 20px;
        }

        input::placeholder {
            color: rgb(150, 150, 150);
        }

        a {
            text-decoration: none;
            color: #6a1b9a;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #39a823;
            color: WHITE;
            font-weight: bold;
            border-style: none;
            border-radius: 10px;
            height: 40px;
            width: 350px;
            transform: translateY(35px);
        }

        button:hover {
            transition: 0.2s;
            background-color: #3ca328;
            cursor: pointer;
        }

        #logo {
            margin-top: 5vh;
            margin-bottom: 5px;
            font-family: "Tilt Warp", sans-serif;
            font-size: 60px;
            font-weight: 400;
            font-style: normal;
            color: #6a1b9a;
            user-select: none;
        }

        #mainFrame {
            height: 340px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: WHITE;
            border-radius: 10px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
        }

        #passwordBlock {
            position: relative;
            width: 300px;
        }

        #password {
            padding-right: 40px;
            width: 100%;
        }


        #email:focus, #password:focus {
            border-bottom-color: #6a1b9a;
        }

        #togglePassword {
            font-size: 16px;
            display: inline-block;
            width: 20px;
            color: rgb(150, 150, 150);
            user-select: none;
            cursor: pointer;
            text-align: center;

            position: absolute;
            right: 10px;
            top: 30%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        #submit {
            margin-top: 10px;
            background-color: #6a1b9a;
            color: WHITE;
            border-style: none;
            border-radius: 10px;
            height: 40px;
            width: 300px;
        }

        #submit:hover {
            transition: 0.2s;
            background-color: #7b32a8;
            cursor: pointer;
        }

        #submit, #createAccBt {
            font-family: Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
        }

        #breakLine {
            display: flex;
            justify-content: center;
            transform: translateY(30px);
            color: rgb(150, 150, 150);
            width: 350px;
        }

        #breakLine hr {
            margin: 10px;
            height: 1px;
            width: 100px;
            border-style: solid;
            color: rgb(150, 150, 150);
        }

        #errors {
            display: none;
            color: rgb(255, 80, 80);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 430px) {
            body {
                background-color: white;
            }
            #mainFrame {
                box-shadow: none;
            }
        }

        @media (max-width: 400px) {
            #breakLine {
                width: 300px;
            }
            #createAccBt {
                width: 300px;
            }
        }

        @media (max-width: 342px) {
            h2 {
                font-size: 28px;
            }
            input, #submit, button {
                width: 90%;
                font-size: 16px;
                height: 35px;
                margin-left: 10px;
            }
            #passwordBlock {
                margin-right: 10px;
            }
            #togglePassword {
                margin-right: -10px;
            }
            #loginForm, #passwordBlock, #breakLine, #createAccBt {
                width: 90%;
            }
            #logo {
                font-size: 50px;
            }
            #mainFrame {
                height: auto;
                padding: 10px;
            }
            #submit {
                width: 80%;
            }
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px white inset;
            box-shadow: 0 0 0 1000px white inset;
            -webkit-text-fill-color: #1d2129;
            transition: background-color 9999s ease-in-out 0s;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
</head>

<body>
    <h1 id="logo"><a href="/" style="text-decoration: none">Flufan</a></h1>
    <div id="mainFrame">
        <h2>Login</h2>
        <form id="loginForm" method="post" action="/api/auth/login">
            <input
                    type="text"
                    name="username"
                    id="email"
                    placeholder="Email or Username"
                    autocomplete="username"
                    required
            >
            <div id="passwordBlock">
                <input type="password"
                       name="password"
                        id="password"
                        placeholder="Password"
                        autocomplete="current-password"
                        required
                >
                <i class="fas fa-eye-slash" id="togglePassword"></i>
            </div>
            <div id="errors"></div>
            <br>
            <input type="submit" id="submit" value="Submit">
        </form>
        <a href="/forgot-password">Forgot password?</a>
    </div>
    <div id="breakLine">
        <hr>
        <p style="white-space: nowrap;">New to Flufan?</p>
        <hr>
    </div>
    <button onclick="window.location.href='/signup'" id="createAccBt">Create an account</button>
    <div style="height: 80px"></div>

    <script>
        const togglePassword = document.querySelector("#togglePassword");
        const passwordInput = document.querySelector("#password");
        const form = document.querySelector("#loginForm");
        const errorsDiv = document.querySelector("#errors");
        const mainFrame = document.querySelector("#mainFrame");

        togglePassword.addEventListener("click", () => {
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            togglePassword.classList.toggle("fa-eye");
            togglePassword.classList.toggle("fa-eye-slash");
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const inputValue = document.querySelector("#email").value.trim();
            const password = passwordInput.value;
            const isEmail = inputValue.includes("@");
            const body = isEmail ? { email: inputValue, password } : { username: inputValue, password };

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "/";
                } else {
                    errorsDiv.textContent = "🥶 " + (data.message || "Login failed");
                    errorsDiv.style.display = "block";
                    mainFrame.style.height = (340 + errorsDiv.offsetHeight + 10) + "px";
                }
            } catch (error) {
                errorsDiv.textContent = "🥶 An error occurred. Please try again later.";
                errorsDiv.style.display = "block";
                mainFrame.style.height = (340 + errorsDiv.offsetHeight + 10) + "px";
            }
        });
    </script>
</body>
</html>
