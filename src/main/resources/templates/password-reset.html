<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flufan- Reset password</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gidugu&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Helvetica, Arial, sans-serif;
        }

        h2 {
            color: #333;
            font-size: 35px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input {
            padding: 10px;
            border-style: none;
            outline: none;
            border-bottom: 2px solid rgb(150, 150, 150);
            width: 300px;
            height: 40px;
            font-size: 16px;
            color: #1d2129;
            margin-bottom: 20px;
        }

        input::placeholder {
            color: rgb(150, 150, 150);
        }

        a {
            text-decoration: none;
            color: #6a1b9a;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #42b72a;
            color: WHITE;
            font-weight: bold;
            border-style: none;
            border-radius: 10px;
            height: 40px;
            width: 350px;
            transform: translateY(35px);
        }

        button:hover {
            transition: 0.2s;
            background-color: #3ca328;
            cursor: pointer;
        }

        #logo {
            margin-top: 5vh;
            margin-bottom: 5px;
            font-family: "Tilt Warp", sans-serif;
            font-size: 60px;
            font-weight: 400;
            font-style: normal;
            color: #6a1b9a;
            user-select: none;
        }

        #mainFrame {
            height: 320px;
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: WHITE;
            border-radius: 10px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
        }

        #newPassword, #repeatPassword {
            padding-right: 30px;
        }

        #newPassword:focus, #repeatPassword:focus {
            border-bottom-color: #6a1b9a;
        }

        #toggleNewPassword, #toggleRepeatPassword {
            width: 4px;
            transform: translateX(-30px);
            color: rgb(150, 150, 150);
        }

        #submit {
            margin-top: 10px;
            height: 40px;
            font-weight: bold;
            border-style: none;
            border-radius: 10px;
            background-color: #6a1b9a;
            color: WHITE;
        }

        #submit:hover {
            transition: 0.2s;
            background-color: #7b32a8;
            cursor: pointer;
        }

        #breakLine {
            display: flex;
            justify-content: center;
            transform: translateY(30px);
            color: rgb(150, 150, 150);
        }

        #breakLine hr {
            margin: 10px;
            height: 1px;
            width: 100px;
            border-style: solid;
            color: rgb(150, 150, 150);
        }

        #errors {
            display: none;
            color: rgb(255, 80, 80);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 430px) {
            body {
                background-color: white;
            }
            #mainFrame {
                box-shadow: none;
            }
        }

        @media (max-width: 342px) {
            h2 {
                font-size: 28px;
            }
            input, #submit, button {
                width: 90%;
                font-size: 16px;
                height: 35px;
                margin-left: 10px;
            }
            #logo {
                font-size: 50px;
            }
            #mainFrame {
                height: auto;
                padding: 10px;
            }
        }

        @media (max-width: 262px) {
            h2 {
                font-size: 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
</head>

<body>
<h1 id="logo"><a href="/" style="text-decoration: none">Flufan</a></h1>
<div id="mainFrame">
    <h2>Reset Password</h2>
    <form method="post" action="/reset-password">
        <input type="hidden" name="token" th:value="${token}" />
        <div class="password-container">
            <input type="password" name="password" id="newPassword" placeholder="New password" required>
            <i class="fas fa-eye-slash" id="toggleNewPassword" aria-label="Show/Hide password"></i>
        </div>
        <div class="password-container">
            <input type="password" id="repeatPassword" placeholder="Repeat password" required>
            <i class="fas fa-eye-slash" id="toggleRepeatPassword" aria-label="Show/Hide password"></i>
        </div>
        <br>
        <div id="errors" style="color: rgb(255, 80, 80); margin-bottom: 10px;"></div>
        <input type="submit" name="submit" id="submit" value="Change Password">
    </form>
</div>
<div style="height: 80px"></div>
<script>
    const toggleNew = document.querySelector("#toggleNewPassword");
    const newPass = document.querySelector("#newPassword");
    toggleNew.addEventListener("click", () => {
        const type = newPass.getAttribute("type") === "password" ? "text" : "password";
        newPass.setAttribute("type", type);
        toggleNew.classList.toggle("fa-eye");
        toggleNew.classList.toggle("fa-eye-slash");
    });

    const toggleRepeat = document.querySelector("#toggleRepeatPassword");
    const repeatPass = document.querySelector("#repeatPassword");
    toggleRepeat.addEventListener("click", () => {
        const type = repeatPass.getAttribute("type") === "password" ? "text" : "password";
        repeatPass.setAttribute("type", type);
        toggleRepeat.classList.toggle("fa-eye");
        toggleRepeat.classList.toggle("fa-eye-slash");
    });

    const form = document.querySelector("form");
    const errorsDiv = document.querySelector("#errors");
    const mainFrame = document.querySelector("#mainFrame");

    form.addEventListener("submit", (e) => {
        const newPassword = newPass.value;
        const repeatPassword = repeatPass.value;

        if (newPassword.length < 8) {
            e.preventDefault();
            errorsDiv.textContent = "🥶 Password must be at least 8 characters";
            errorsDiv.style.display = "block";
            mainFrame.style.height = (320 + errorsDiv.offsetHeight + 10) + "px";
        } else if (newPassword !== repeatPassword) {
            e.preventDefault();
            errorsDiv.textContent = "🥶 Passwords do not match";
            errorsDiv.style.display = "block";
            mainFrame.style.height = (320 + errorsDiv.offsetHeight + 10) + "px";
        } else {
            errorsDiv.textContent = "";
            errorsDiv.style.display = "none";
            mainFrame.style.height = "320px";
        }
    });
</script>
</body>
</html>
