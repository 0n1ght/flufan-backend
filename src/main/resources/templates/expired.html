<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Flufan — Link expired</title>
    <style>
        :root{
          --red:#d93025;
          --purple:#6a1b9a;
          --bg:#d2b8e3;
          --text:#0f1724;
          --max-width:520px;
        }

        html,body{
          height:100%;
          margin:0;
          background:var(--bg);
          color:var(--text);
          font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;
        }

        .page {
          min-height:100vh;
          display:flex;
          align-items:flex-start;
          justify-content:center;
          padding-top:9vh;
        }

        .card {
          width:100%;
          max-width:var(--max-width);
          text-align:center;
          padding:28px 20px;
          box-sizing:border-box;
        }

        h1.app-name{
          margin:0 0 22px 0;
          font-size:30px;
          font-weight:800;
          color:var(--purple);
        }

        .icon {
          display:flex;
          align-items:center;
          justify-content:center;
          width:84px;
          height:84px;
          margin:0 auto 18px auto;
          border-radius:999px;
          background:rgba(217,48,37,0.12);
        }

        .icon svg{
          width:44px;
          height:44px;
        }

        p.status{
          margin:0 0 25px 0;
          font-size:18px;
          font-weight:600;
        }

        a.return{
          font-size:16px;
          font-weight:500;
          color:var(--purple);
          text-decoration:none;
        }

        a.return:hover{
          text-decoration:underline;
        }
    </style>
</head>
<body>
<main class="page">
    <section class="card">
        <h1 class="app-name">Flufan</h1>

        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 6l12 12M18 6L6 18" stroke="#d93025" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>

        <p class="status">Link expired</p>

        <a class="return" href="http://localhost:8080">Return to app</a>
    </section>
</main>
</body>
</html>
